<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Connexion - MediConnect</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="login-container">
    <!-- Logo et titre -->
    <div class="logo-section">
      <ion-icon name="medical" size="large" color="primary"></ion-icon>
      <h1>MediConnect</h1>
      <p>Votre santé, notre priorité</p>
    </div>

    <!-- Formulaire -->
    <form #loginForm="ngForm" (ngSubmit)="login()">
      <ion-item>
        <ion-label position="floating">Email</ion-label>
        <ion-input 
          type="email" 
          [(ngModel)]="email" 
          name="email" 
          required
          placeholder="exemple@email.com">
        </ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="floating">Mot de passe</ion-label>
        <ion-input 
          type="password" 
          [(ngModel)]="password" 
          name="password" 
          required
          placeholder="••••••••">
        </ion-input>
      </ion-item>

      <ion-button 
        expand="block" 
        type="submit" 
        [disabled]="!loginForm.valid"
        class="ion-margin-top">
        Se connecter
      </ion-button>
    </form>

    <!-- Lien inscription -->
    <div class="links ion-text-center ion-margin-top">
      <p>
        Pas encore de compte ? 
        <a routerLink="/register">S'inscrire</a>
      </p>
    </div>

    <!-- Message d'erreur -->
    <ion-card *ngIf="errorMessage" color="danger" class="ion-margin-top">
      <ion-card-content>
        {{ errorMessage }}
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
